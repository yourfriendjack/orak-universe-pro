<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ORAK Universe — Sin conexión</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0e0d0b;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
      color: #f5ead8;
      text-align: center;
      padding: 24px;
    }
    .sigil {
      font-size: 3.5rem;
      margin-bottom: 24px;
      opacity: .85;
      animation: pulsar 3s ease-in-out infinite;
    }
    @keyframes pulsar {
      0%, 100% { opacity: .5; transform: scale(1); }
      50%       { opacity: 1;  transform: scale(1.06); }
    }
    h1 {
      font-size: 1.4rem;
      letter-spacing: .08em;
      margin-bottom: 10px;
      color: #c8a860;
    }
    p {
      font-size: .9rem;
      color: #a08060;
      line-height: 1.7;
      max-width: 300px;
      margin-bottom: 32px;
    }
    .btn {
      padding: 12px 28px;
      background: #c8860a;
      color: #0e0d0b;
      border: none;
      border-radius: 999px;
      font-family: inherit;
      font-size: .85rem;
      font-weight: 700;
      letter-spacing: .06em;
      cursor: pointer;
    }
    .btn:active { opacity: .8; }
  </style>
</head>
<body>
  <div class="sigil">☽</div>
  <h1>La niebla te cubre</h1>
  <p>No hay conexión en este momento.<br>La Memoria de Orak guarda lo que conoces.</p>
  <button class="btn" onclick="window.location.reload()">Intentar de nuevo</button>
</body>
</html>
