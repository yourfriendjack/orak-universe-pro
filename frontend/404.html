<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — ORAK Universe</title>
  <link rel="stylesheet" href="/css/orak.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #06080f;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      text-align: center;
      padding: 20px;
    }
    .container {
      max-width: 480px;
    }
    .code {
      font-size: 120px;
      font-weight: 900;
      background: linear-gradient(135deg, #d4af37, #f0ac3a, #b48ef7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 8px;
    }
    .titulo {
      font-size: 22px;
      font-weight: 700;
      color: #d4af37;
      margin-bottom: 12px;
    }
    .sub {
      font-size: 14px;
      color: #888;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .btn-home {
      display: inline-block;
      padding: 12px 32px;
      background: linear-gradient(135deg, #d4af37, #f0ac3a);
      color: #06080f;
      font-weight: 700;
      font-size: 14px;
      border-radius: 8px;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn-home:hover { opacity: 0.85; }
    .stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .star {
      position: absolute;
      width: 2px; height: 2px;
      background: #fff;
      border-radius: 50%;
      animation: twinkle 3s infinite alternate;
    }
    @keyframes twinkle {
      0%   { opacity: 0.1; }
      100% { opacity: 0.8; }
    }
    .container { position: relative; z-index: 1; }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="container">
    <div class="code">404</div>
    <div class="titulo">Dimensión no encontrada</div>
    <div class="sub">
      Este rincón del universo no existe... todavía.<br>
      Quizás fue eliminado por las fuerzas del vacío,<br>
      o simplemente nunca fue escrito.
    </div>
    <a href="/" class="btn-home">⬡ Volver al universo</a>
  </div>

  <script>
    // Generar estrellas de fondo
    const container = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top  = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 3 + 's';
      star.style.opacity = Math.random() * 0.7 + 0.1;
      container.appendChild(star);
    }
  </script>
</body>
</html>
